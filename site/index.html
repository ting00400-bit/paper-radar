<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>論文學習雷達</title>
<link rel="stylesheet" href="style.css?v=20260706b">
</head>
<body>
<header>
  <div class="head-top">
    <h1><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 6h.01"/><path d="M2.29 9.62a10 10 0 1 0 19.02-1.27"/><path d="M16.24 7.76a6 6 0 1 0-8.23 8.63"/><path d="M12 18h.01"/><path d="M17.99 11.66a6 6 0 0 1-2.22 4.58"/><circle cx="12" cy="12" r="2"/><path d="m13.41 10.59 5.66-5.66"/></svg> 論文學習雷達</h1>
    <div class="head-right">
      <span class="meta" id="meta">載入中…</span>
      <button id="headToggle" class="head-toggle" aria-label="展開/收合設定" title="展開/收合">▶</button>
    </div>
  </div>

  <div id="visitBanner" class="visit-banner hidden"></div>

  <!-- 已看/未看分頁（常駐，不隨 headExtra 收合） -->
  <div class="tabs" id="tabs">
    <button class="tab" data-tab="unseen">未看</button>
    <button class="tab" data-tab="seen">已看</button>
  </div>

  <!-- 可折疊：搜尋 + 訂閱 + 上傳 + 篩選 -->
  <div id="headExtra" class="head-extra">
    <!-- 搜尋 -->
    <input type="search" id="search" placeholder="搜尋標題 / 作者 / 期刊…">

    <!-- 上傳外部論文（非 RSS 來源） -->
    <details class="upload">
      <summary><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg> 上傳外部論文（非雷達來源，給 Claude 跑全文）</summary>
      <div class="upload-body">
        <input type="file" id="upFile" accept="application/pdf">
        <input type="text" id="upTitle" placeholder="標題（選填）">
        <input type="text" id="upDoi" placeholder="DOI（選填，有的話更好）">
        <div class="up-modes">
          <label class="up-check"><input type="checkbox" id="upContent" checked> <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> 內容整理（/paper-digest）</label>
          <label class="up-check"><input type="checkbox" id="upQuality"> <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg> 品質評讀（/paper-review）</label>
        </div>
        <button id="upBtn">上傳</button>
        <span id="upMsg" class="up-msg"></span>
      </div>
    </details>

    <!-- 主題訂閱開關 -->
    <div class="topics" id="topics"></div>

    <!-- 篩選列 -->
    <div class="filter-row">
      <select id="sort">
        <option value="score">分數高→低</option>
        <option value="date">最新優先</option>
      </select>
      <div class="chips" id="badgeFilter">
        <button class="chip" data-badge="all" data-on="1">全部</button>
        <button class="chip" data-badge="oa"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> OA</button>
        <button class="chip" data-badge="oanew"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> 新開放</button>
        <button class="chip" data-badge="inst"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg> 機構訂閱</button>
        <button class="chip" data-badge="new"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l1.9 5.7a2 2 0 0 0 1.4 1.4L21 12l-5.7 1.9a2 2 0 0 0-1.4 1.4L12 21l-1.9-5.7a2 2 0 0 0-1.4-1.4L3 12l5.7-1.9a2 2 0 0 0 1.4-1.4Z"/></svg> NEW</button>
      </div>
    </div>
  </div>
</header>

<main id="list"></main>
<footer><span id="count"></span> · 牙醫師 林晉廷 · 私人學習站</footer>

<script src="app.js?v=20260706b"></script>
</body>
</html>
